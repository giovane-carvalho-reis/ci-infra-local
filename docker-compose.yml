version: "3.9"

services:
  github-runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      REPO_URL: ${REPO_URL}
      RUNNER_TOKEN: ${RUNNER_TOKEN}
      RUNNER_NAME: ${RUNNER_NAME}
      RUNNER_LABELS: ${RUNNER_LABELS}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-data:/actions-runner
    restart: unless-stopped

volumes:
  runner-data: